# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          source /home/runner/.bashrc
          echo '~/.bun/bin' >> $GITHUB_PATH
      - name: Setup Rust nightly
        run: |
          rustup toolchain install nightly --profile minimal
          rustup target add wasm32-wasip1-threads --toolchain nightly
      - name: install wasi_virt_layer
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/oligamiq/wasi_virt_layer/releases/download/v0.6.1/wasi_virt_layer-cli-installer.sh | sh
      - name: Install Binaryen
        env:
          BINARYEN_VERSION: version_131
          BINARYEN_SHA256: b5bf1f0eaf17c63ee588ff7a5954dc8f6ce2c26989051c66f24dfe9ece3e46db
        run: |
          curl --fail --location --retry 3 \
            --output binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz"

          echo "${BINARYEN_SHA256}  binaryen.tar.gz" | sha256sum --check -

          tar -xzf binaryen.tar.gz

          BINARYEN_DIR="$PWD/binaryen-${BINARYEN_VERSION}"
          echo "${BINARYEN_DIR}/bin" >> "$GITHUB_PATH"

          "${BINARYEN_DIR}/bin/wasm-opt" --version
          "${BINARYEN_DIR}/bin/wasm-opt" --help \
            | grep -q -- "--enable-shared-everything"
          "${BINARYEN_DIR}/bin/wasm-opt" --help \
            | grep -q -- "--enable-multimemory"

      - name: Build
        run: |
          bun i
          bun run build:prod
          bun run vfs:prepare:prod
          cd page
          bunx mini-coi -sw dist/mini-coi.js
          sed -i '/<head>/a \    <script src="./mini-coi.js" scope="./"></script>' dist/index.html
      - name: Add v1 static snapshot
        run: |
          rm -rf page/dist/v1
          mkdir -p page/dist/v1

          git fetch --depth=1 origin refs/heads/v1-dist
          git archive --format=tar FETCH_HEAD \
            | tar -xf - -C page/dist/v1

          test -f page/dist/v1/index.html
          test -d page/dist/v1/assets

          echo "v1 snapshot:"
          find page/dist/v1 -maxdepth 2 -type f | sort

      - name: Verify artifacts
        run: |
          node scripts/verify-vfs-asset.mjs page/dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './page/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
