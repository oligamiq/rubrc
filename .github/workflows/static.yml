# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Source commit SHA
        required: true
        type: string
      dist_sha:
        description: pages-dist commit SHA
        required: true
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate SHA inputs
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          DIST_SHA: ${{ inputs.dist_sha }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          if ! [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Error: source_sha must be a 40-character lowercase hex SHA"
            exit 1
          fi

          if ! [[ "$DIST_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Error: dist_sha must be a 40-character lowercase hex SHA"
            exit 1
          fi

          if [ "$SOURCE_SHA" != "$TRIGGER_SHA" ]; then
            echo "Error: source_sha does not match workflow trigger SHA"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha }}
          path: source
          fetch-depth: 1

      - name: Checkout prebuilt site
        uses: actions/checkout@v4
        with:
          ref: pages-dist
          path: site
          fetch-depth: 1

      - name: Validate dist SHA
        env:
          DIST_SHA: ${{ inputs.dist_sha }}
        run: |
          ACTUAL_DIST_SHA="$(git -C site rev-parse HEAD)"

          if [ "$ACTUAL_DIST_SHA" != "$DIST_SHA" ]; then
            echo "Error: actual pages-dist SHA does not match expected SHA"
            exit 1
          fi

      - name: Remove site/.git
        run: rm -rf site/.git

      - name: Validate metadata
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const metadata = JSON.parse(
            fs.readFileSync(
              "site/.rubrc-pages-build.json",
              "utf8",
            ),
          );

          if (metadata.version !== 1) {
            throw new Error("metadata.version !== 1");
          }

          if (metadata.sourceSha !== process.env.SOURCE_SHA) {
            throw new Error(
              "metadata.sourceSha does not match source_sha",
            );
          }
          NODE

      - name: Verify artifacts
        run: node source/scripts/verify-vfs-asset.mjs site

      - name: Remove .rubrc-pages-build.json
        run: rm -f site/.rubrc-pages-build.json

      - name: Confirm index.html and v1/index.html
        run: |
          test -f site/index.html
          test -f site/v1/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
